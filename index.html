<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIEP VHF Net — Coverage Chart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --water:#EFF5F6; --panel:#FFFFFF; --ink:#14313C; --muted:#5F7B85;
  --hairline:#D4E1E4; --accent:#0E6E8C; --accent-soft:#E3EEF2;
  --s1:#D7263D; --s2:#F28E1C; --s3:#1F6FEB; --s-un:#1B1B1B;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0; background:var(--water); color:var(--ink);
  font-family:'Barlow',system-ui,sans-serif; font-size:15px;
  display:flex; flex-direction:column;}
header{border-bottom:1px solid var(--hairline); background:var(--panel); padding:14px 20px 12px;}
.cartouche{display:inline-block; border:1px solid var(--ink); padding:6px 18px 8px;
  box-shadow:0 0 0 1px var(--panel), 0 0 0 2px var(--ink);}
.cartouche .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.22em;
  text-transform:uppercase; color:var(--muted); display:block; margin-bottom:2px;}
.cartouche h1{margin:0; font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:26px; letter-spacing:.06em; text-transform:uppercase; line-height:1;}
.controls{display:flex; flex-wrap:wrap; align-items:center; gap:14px 22px;
  padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--hairline);}
.field-label{font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--muted); display:block; margin-bottom:4px;}
.combo{position:relative; width:250px}
.combo input{width:100%; padding:8px 30px 8px 10px; font-family:'IBM Plex Mono',monospace;
  font-size:14px; font-weight:500; color:var(--ink);
  border:1px solid var(--hairline); border-radius:4px; background:var(--panel);}
.combo input:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent)}
.combo .caret{position:absolute; right:10px; bottom:10px; pointer-events:none; color:var(--muted); font-size:11px}
.combo-list{position:absolute; z-index:1200; left:0; right:0; top:calc(100% + 4px);
  background:var(--panel); border:1px solid var(--hairline); border-radius:4px;
  box-shadow:0 8px 20px rgba(20,49,60,.14); max-height:280px; overflow-y:auto; display:none;}
.combo-list.open{display:block}
.combo-item{padding:8px 10px; cursor:pointer; font-family:'IBM Plex Mono',monospace; font-size:13px;
  display:flex; justify-content:space-between; gap:10px;}
.combo-item .who{font-family:'Barlow',sans-serif; color:var(--muted); font-size:12px; text-align:right}
.combo-item:hover,.combo-item.active{background:var(--accent-soft)}
.combo-empty{padding:8px 10px; color:var(--muted); font-size:13px}
.checks{display:flex; gap:16px; align-items:center}
.checks label{display:flex; gap:7px; align-items:center; font-weight:500; cursor:pointer; user-select:none}
.checks input{width:16px; height:16px; accent-color:var(--accent); cursor:pointer}
.seg{display:inline-flex; border:1px solid var(--hairline); border-radius:4px; overflow:hidden}
.seg button{border:0; background:var(--panel); color:var(--ink); padding:7px 16px;
  font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:15px;
  letter-spacing:.08em; text-transform:uppercase; cursor:pointer;}
.seg button + button{border-left:1px solid var(--hairline)}
.seg button.on{background:var(--accent); color:#fff}
.seg.disabled button{color:#B9C7CC; background:#F3F6F7; cursor:not-allowed}
.seg button:focus-visible{outline:2px solid var(--accent); outline-offset:-2px}
.legend{margin-left:auto; display:flex; gap:14px; align-items:center; flex-wrap:wrap;
  border:1px solid var(--hairline); border-radius:4px; padding:6px 12px; background:var(--panel);}
.legend .field-label{margin:0 4px 0 0}
.lg{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink)}
.lg svg{display:block}
main{flex:1; display:flex; min-height:0}
aside{width:320px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--hairline);
  display:flex; flex-direction:column; min-height:0;}
.aside-head{padding:12px 16px 8px; border-bottom:1px solid var(--hairline);
  font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:16px;
  letter-spacing:.08em; text-transform:uppercase;}
.aside-head .count{color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0}
#results{list-style:none; margin:0; padding:6px; overflow-y:auto; flex:1}
#results .hint{padding:14px 10px; color:var(--muted); line-height:1.5}
.res{display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:6px;
  cursor:default; border:1px solid transparent;}
.res + .res{margin-top:2px}
.res:hover,.res.hl{background:var(--accent-soft); border-color:#CBDFE7}
.res .swatch{flex-shrink:0}
.res .cs{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px; line-height:1.3}
.res .cs .who{display:block; font-family:'Barlow',sans-serif; font-weight:400; color:var(--muted); font-size:11.5px}
.res .meta{margin-left:auto; text-align:right; font-size:11.5px; color:var(--muted); line-height:1.35; flex-shrink:0}
.res .nomap{font-size:10.5px; color:var(--s1); font-family:'Barlow',sans-serif; font-weight:500}
/* data notes */
#notes{border-top:1px solid var(--hairline); font-size:12.5px; max-height:45%; display:flex; flex-direction:column}
#notes summary{cursor:pointer; padding:10px 16px; font-family:'Barlow Condensed',sans-serif;
  font-weight:600; font-size:14px; letter-spacing:.08em; text-transform:uppercase; user-select:none}
#notes[open] summary{border-bottom:1px solid var(--hairline)}
#notes .notes-body{overflow-y:auto; padding:8px 16px 12px; line-height:1.5; color:var(--ink)}
#notes h4{margin:10px 0 3px; font-size:11px; font-family:'IBM Plex Mono',monospace;
  letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:600}
#notes ul{margin:0; padding-left:18px}
.map-wrap{position:relative; flex:1; display:flex; min-height:0}
#map{flex:1; min-height:0; background:#DCE9EC}
.cs-label{background:rgba(255,255,255,.88); border:1px solid var(--hairline);
  border-radius:3px; padding:0 4px; font-family:'IBM Plex Mono',monospace;
  font-size:10px; font-weight:600; color:var(--ink); box-shadow:none; pointer-events:none;}
.cs-label::before{display:none}
.notice{position:absolute; z-index:1100; left:50%; transform:translateX(-50%); bottom:18px;
  background:var(--ink); color:#fff; padding:8px 14px; border-radius:5px;
  font-size:13px; max-width:90%; display:none;}
.chip{position:absolute; z-index:1100; top:12px; right:12px; background:var(--panel);
  border:1px solid var(--hairline); border-radius:4px; padding:6px 12px; font-size:12.5px;
  color:var(--muted); display:none; box-shadow:0 2px 8px rgba(20,49,60,.10);}
/* loading / file picker overlay */
#overlay{position:fixed; inset:0; z-index:2000; background:var(--water);
  display:flex; align-items:center; justify-content:center; padding:20px}
.overlay-card{background:var(--panel); border:1px solid var(--hairline); border-radius:8px;
  padding:26px 30px; max-width:520px; box-shadow:0 12px 34px rgba(20,49,60,.15); line-height:1.55}
.overlay-card h2{margin:0 0 8px; font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:22px; letter-spacing:.05em; text-transform:uppercase}
.overlay-card p{margin:8px 0; color:var(--ink)}
.overlay-card .sub{color:var(--muted); font-size:13px}
.filerow{margin:12px 0 4px}
.filerow label{display:block; font-weight:600; margin-bottom:4px}
@media (max-width:820px){
  main{flex-direction:column}
  aside{width:100%; max-height:44vh; border-right:0; border-bottom:1px solid var(--hairline)}
  .legend{margin-left:0}
  .map-wrap{min-height:50vh}
}
@media (prefers-reduced-motion:no-preference){
  .res,.seg button{transition:background .12s ease}
}
</style>
</head>
<body>

<header>
  <div class="cartouche">
    <span class="eyebrow">Pender Islands Emergency Program · VHF Simplex</span>
    <h1>PIEP Net — Coverage Chart</h1>
  </div>
</header>

<div class="controls">
  <div>
    <label class="field-label" for="csInput">Call sign / station</label>
    <div class="combo" id="combo">
      <input id="csInput" type="text" placeholder="Search…" autocomplete="off"
             role="combobox" aria-expanded="false" aria-controls="comboList">
      <span class="caret">▾</span>
      <div class="combo-list" id="comboList" role="listbox"></div>
    </div>
  </div>

  <div>
    <span class="field-label">Show stations that…</span>
    <div class="checks">
      <label><input type="checkbox" id="ckHeardBy" checked> heard by</label>
      <label><input type="checkbox" id="ckCanHear" checked> can hear</label>
    </div>
  </div>

  <div>
    <span class="field-label">Match</span>
    <div class="seg" id="seg">
      <button id="btnAnd" class="on" aria-pressed="true">And</button>
      <button id="btnOr" aria-pressed="false">Or</button>
    </div>
  </div>

  <div class="legend" aria-label="Signal quality legend">
    <span class="field-label">Signal</span>
    <span class="lg"><svg width="26" height="8"><line x1="0" y1="4" x2="26" y2="4" stroke="var(--s3)" stroke-width="3"/></svg>3 clear</span>
    <span class="lg"><svg width="26" height="8"><line x1="0" y1="4" x2="26" y2="4" stroke="var(--s2)" stroke-width="3"/></svg>2 okay</span>
    <span class="lg"><svg width="26" height="8"><line x1="0" y1="4" x2="26" y2="4" stroke="var(--s1)" stroke-width="3"/></svg>1 poor</span>
    <span class="lg"><svg width="26" height="8"><line x1="0" y1="4" x2="26" y2="4" stroke="var(--s1)" stroke-width="3" stroke-dasharray="5 4"/></svg>0.5 trace</span>
    <span class="lg"><svg width="26" height="8"><line x1="0" y1="4" x2="26" y2="4" stroke="var(--s-un)" stroke-width="3"/></svg>– unrated</span>
  </div>
</div>

<main>
  <aside>
    <div class="aside-head">Contacts <span class="count" id="count"></span></div>
    <ul id="results"><li class="hint">Pick a station above to see who they can reach.</li></ul>
    <details id="notes">
      <summary>Data notes <span id="notesCount"></span></summary>
      <div class="notes-body" id="notesBody"></div>
    </details>
  </aside>
  <div class="map-wrap">
    <div id="map"></div>
    <div class="chip" id="chip"></div>
    <div class="notice" id="notice"></div>
  </div>
</main>

<div id="overlay">
  <div class="overlay-card" id="overlayCard">
    <h2>Loading net data…</h2>
    <p class="sub">Reading contacts.csv and chart.csv</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
/* ════════════════════════════ SETTINGS ═══════════════════════════════
   To update the site: export your two Google Sheets as CSV, rename them
   to the names below, drop them in this folder, and refresh the page.  */
const FILES = { contacts: "contacts.csv", chart: "chart.csv" };

// Addresses are searched on North/South Pender Island based on the (N)/(S)
// in each contact's call sign; results outside the Penders are rejected.
const MAP_CENTER = [48.772, -123.29], MAP_ZOOM = 12;

/* Spelling bridges between the contacts sheet and the chart. Left side =
   name as written in the contacts "Call Sign" column, right side = name
   as written in the chart. (Punctuation/capitals/(N)/(S) are ignored
   automatically, so only real wording differences need an entry.)      */
const ALIASES = {
  "PI School":          "School",
  "Anglican Church":    "Anglican Hall",
  "FH3":                "Fire Hall 3",
  "PI Medical Clinic":  "Medical Clinic",
  "Boundary Pass":      "Boundary Passage Dr",
  "Plumber Way":        "Trinco Water Tower"   // Mike M. — delete if wrong!
};

/* ═══════════════════════ SMALL UTILITIES ═════════════════════════════ */
const esc = s => String(s ?? "").replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function norm(s){
  return String(s).toLowerCase()
    .replace(/\(.*?\)/g, " ")
    .replace(/[.,&/#*]/g, " ")
    .replace(/\s+/g, " ").trim()
    .replace(/\bs\b/g, "south")
    .replace(/\bpt\b/g, "point");
}
const NALIAS = {};
for (const k in ALIASES) NALIAS[norm(k)] = norm(ALIASES[k]);

/* ═══════════════════ LOAD + PARSE THE TWO CSVs ═══════════════════════ */
const model = { calls: [], M: {}, info: {}, issues: {} };
// model.M[listener][speaker] = value  ·  model.info[station] = {name, address, lat, lon, approx}

async function fetchText(name){
  const r = await fetch(name, { cache: "no-store" });
  if (!r.ok) throw new Error(name + ": " + r.status);
  return r.text();
}
function startLoad(){
  Promise.all([fetchText(FILES.contacts), fetchText(FILES.chart)])
    .then(([c, ch]) => { buildModel(c, ch); boot(); })
    .catch(showPicker);
}
function showPicker(){
  document.getElementById("overlayCard").innerHTML = `
    <h2>Choose the data files</h2>
    <p class="sub">The page couldn't read <b>${esc(FILES.contacts)}</b> and <b>${esc(FILES.chart)}</b>
    automatically — browsers block this when the page is opened straight from a folder.
    Pick the two files below, or host the folder (e.g. GitHub Pages) and it will load on its own.</p>
    <div class="filerow"><label>Contacts sheet (names &amp; addresses)</label><input type="file" id="fContacts" accept=".csv"></div>
    <div class="filerow"><label>Radio test chart (who heard whom)</label><input type="file" id="fChart" accept=".csv"></div>`;
  let cTxt = null, chTxt = null;
  const tryGo = () => { if (cTxt !== null && chTxt !== null){ buildModel(cTxt, chTxt); boot(); } };
  document.getElementById("fContacts").addEventListener("change", e =>
    e.target.files[0]?.text().then(t => { cTxt = t; tryGo(); }));
  document.getElementById("fChart").addEventListener("change", e =>
    e.target.files[0]?.text().then(t => { chTxt = t; tryGo(); }));
}

function buildModel(contactsTxt, chartTxt){
  const iss = model.issues = { noContact: [], notInChart: [], dupes: [], geoFail: [], geoApprox: [] };

  /* ── chart ── */
  const rows = Papa.parse(chartTxt.trim(), { skipEmptyLines: false }).data;
  const colNames = rows[0].slice(1).map(s => s.trim());
  const stationSet = new Set(colNames.filter(Boolean));
  const M = model.M = {};
  for (const r of rows.slice(1)){
    const rn = (r[0] || "").trim();
    if (!rn) continue;
    const cells = r.slice(1);
    if (!cells.some(c => (c || "").trim())) continue;      // blank/section rows
    stationSet.add(rn);
    M[rn] = {};
    cells.forEach((cell, i) => {
      const col = colNames[i]; if (!col) return;
      const t = (cell || "").trim();
      if (!t || t.toUpperCase() === "X") return;           // no data / self
      M[rn][col] = t === "-" ? "-" : parseFloat(t);
    });
  }
  model.calls = [...stationSet].sort((a, b) => a.localeCompare(b));
  const byNorm = {};
  for (const s of model.calls) byNorm[norm(s)] = s;

  /* ── contacts ── */
  const crows = Papa.parse(contactsTxt.trim(), { skipEmptyLines: true }).data;
  const hdrIdx = crows.findIndex(r => r.some(c => /name/i.test(c)));
  const hdr = crows[hdrIdx] || [];
  const col = re => hdr.findIndex(h => re.test(h));
  const iName = col(/name/i), iCall = col(/call/i), iAddr = col(/address/i),
        iLat = col(/\blat/i), iLon = col(/\blon|\blng/i);

  const matches = {};                                       // station → [contact,…]
  for (const r of crows.slice(hdrIdx + 1)){
    const call = (r[iCall] || "").trim();
    const name = (r[iName] || "").trim();
    if (!name && !call) continue;
    const c = { name, call,
      address: iAddr >= 0 ? (r[iAddr] || "").trim() : "",
      lat: iLat >= 0 ? parseFloat(r[iLat]) : NaN,
      lon: iLon >= 0 ? parseFloat(r[iLon]) : NaN };
    if (!call || call === "?"){ iss.notInChart.push(c); continue; }
    let n = norm(call); n = NALIAS[n] ?? n;
    const st = byNorm[n];
    if (st) (matches[st] ??= []).push(c);
    else iss.notInChart.push(c);
  }

  model.info = {};
  for (const st of model.calls){
    const list = matches[st];
    if (!list){ iss.noContact.push(st); model.info[st] = {}; continue; }
    // prefer the entry whose address starts with a house number
    const pick = list.find(c => /^\d/.test(c.address.replace(/^.*:\s*/, ""))) || list[0];
    if (list.length > 1)
      iss.dupes.push(st + " → " + list.map(c => c.name).join(", ") + " (using " + pick.name + ")");
    const region = /\(\s*n\s*\)/i.test(pick.call) ? "North Pender Island"
                 : /\(\s*s\s*\)/i.test(pick.call) ? "South Pender Island" : "Pender Island";
    model.info[st] = { name: pick.name, address: pick.address, region,
      lat: isFinite(pick.lat) ? pick.lat : null, lon: isFinite(pick.lon) ? pick.lon : null };
  }
}

/* ═════════════ ADDRESS → MAP POSITION ════════════════════════════════ */
let geoCache = {};
try { geoCache = JSON.parse(localStorage.getItem("piepGeo3") || "{}"); } catch(e){}
const saveCache = () => { try { localStorage.setItem("piepGeo3", JSON.stringify(geoCache)); } catch(e){} };
const sleep = ms => new Promise(r => setTimeout(r, ms));

// Only accept results that actually land on/around the Pender Islands.
const BOX = { latMin: 48.68, latMax: 48.85, lonMin: -123.45, lonMax: -123.15 };
const inBox = p => p && p.lat > BOX.latMin && p.lat < BOX.latMax &&
                        p.lon > BOX.lonMin && p.lon < BOX.lonMax;

// Three independent lookup services; if one keeps erroring we stop asking it.
const health = { bc: 0, photon: 0, nominatim: 0 };

// BC government address geocoder — knows every civic address in BC.
const BC_EXACT = new Set(["CIVIC_NUMBER", "CIVIC_NUMBER_RANGE", "SITE", "BLOCK", "INTERSECTION"]);
async function bcgeo(addr){
  const url = "https://geocoder.api.gov.bc.ca/addresses.json?maxResults=1&minScore=55&addressString=" +
              encodeURIComponent(addr + ", Pender Island, BC");
  const r = await fetch(url);
  if (!r.ok) throw new Error("service replied " + r.status);
  const f = (await r.json()).features?.[0];
  if (!f) return null;
  const [lon, lat] = f.geometry.coordinates;
  if (!inBox({ lat, lon })) return null;
  const prec = f.properties?.matchPrecision;
  if (BC_EXACT.has(prec)) return { lat, lon, approx: false };
  if (prec === "STREET")  return { lat, lon, approx: true };
  return null;               // locality-level guesses just stack dots
}
async function photon(q){
  const url = "https://photon.komoot.io/api/?limit=5&lat=" + MAP_CENTER[0] +
              "&lon=" + MAP_CENTER[1] + "&q=" + encodeURIComponent(q);
  const r = await fetch(url);
  if (!r.ok) throw new Error("service replied " + r.status);
  const j = await r.json();
  for (const f of (j.features || [])){
    const [lon, lat] = f.geometry.coordinates;
    if (!inBox({ lat, lon })) continue;
    return { lat, lon, approx: !f.properties?.housenumber };
  }
  return null;
}
async function nominatim(q){
  const url = "https://nominatim.openstreetmap.org/search?format=jsonv2&limit=3&q=" +
              encodeURIComponent(q);
  const r = await fetch(url);
  if (!r.ok) throw new Error("service replied " + r.status);
  const j = await r.json();
  for (const it of j){
    const p = { lat: +it.lat, lon: +it.lon };
    if (!inBox(p)) continue;
    return { ...p, approx: !(it.addresstype === "house" || it.addresstype === "building") };
  }
  return null;
}
async function locate(addr, region){
  const street = addr.replace(/^[\d\s\-#]+/, "").trim();
  const tries = [
    { name: "bc",        run: () => bcgeo(addr) },
    { name: "photon",    run: () => photon(addr + " " + region) },
    { name: "nominatim", run: () => nominatim(addr + ", " + region + ", British Columbia, Canada") },
    { name: "photon",    run: () => photon(street + " " + region), approx: true },
    { name: "nominatim", run: () => nominatim(street + ", " + region + ", British Columbia, Canada"), approx: true },
  ];
  let approxCandidate = null, lastErr = null;
  for (const t of tries){
    if (health[t.name] >= 2) continue;
    try {
      const p = await t.run();
      health[t.name] = 0;
      if (p){
        if (p.approx || t.approx) approxCandidate ??= { ...p, approx: true };
        else return { ...p, approx: false };        // exact hit — done
      }
    } catch(e){ health[t.name]++; lastErr = e; }
    await sleep(1000);                              // be polite to the free services
  }
  if (approxCandidate) return approxCandidate;      // best we could do: street level
  if (lastErr) throw lastErr;
  return null;
}
async function geocodeAll(){
  const chip = document.getElementById("chip");
  health.bc = health.photon = health.nominatim = 0;
  model.issues.geoFail = [];
  model.issues.geoApprox = [];
  const todo = model.calls.filter(cs => {
    const s = model.info[cs];
    return s && s.lat == null && s.address && /\d/.test(s.address);
  });
  let done = 0, changed = false;
  for (const cs of todo){
    const s = model.info[cs];
    const addr = s.address.replace(/^.*?:\s*/, "").replace(/"/g, "").trim();
    const key = addr + "|" + s.region;
    let hit = geoCache[key], reason = "no match found in the map database";
    if (!hit){
      chip.style.display = "block";
      chip.textContent = "Locating addresses… " + (done + 1) + "/" + todo.length;
      try {
        hit = await locate(addr, s.region);
        if (hit){ geoCache[key] = hit; saveCache(); }
      } catch(e){ reason = "lookup failed (" + e.message + ")"; }
    }
    if (hit){
      s.lat = hit.lat; s.lon = hit.lon; s.approx = !!hit.approx;
      addMarker(cs); changed = true;
      if (s.approx) model.issues.geoApprox.push(cs);
    } else {
      model.issues.geoFail.push(cs + " — “" + s.address + "” · " + reason);
    }
    done++;
  }
  chip.style.display = "none";
  deOverlap();
  renderNotes();
  if (changed) fitAll();
  update();
}

/* Nudge apart any dots that landed on the exact same spot (e.g. several
   street-level placements on the same road) so all stay hoverable.     */
function deOverlap(){
  for (const cs in markers){                       // reset to true positions
    const s = model.info[cs];
    markers[cs].setLatLng([s.lat, s.lon]);
  }
  const seen = {};
  for (const cs of Object.keys(markers).sort()){
    const s = model.info[cs];
    const k = s.lat.toFixed(4) + "," + s.lon.toFixed(4);
    const n = seen[k] = (seen[k] || 0) + 1;
    if (n > 1){
      const a = n * 2.1;
      markers[cs].setLatLng([s.lat + 0.0005 * n * Math.cos(a),
                             s.lon + 0.0008 * n * Math.sin(a)]);
    }
  }
}

/* ═══════════════════════════════ MAP ═════════════════════════════════ */
const map = L.map("map").setView(MAP_CENTER, MAP_ZOOM);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);
const BASE = { radius: 7, weight: 2, color: "#FFFFFF", fillColor: "#5F7B85", fillOpacity: 1 };
const markers = {};
const lineLayer = L.layerGroup().addTo(map);

function addMarker(cs){
  const s = model.info[cs];
  if (!s || s.lat == null || markers[cs]) return;
  const m = L.circleMarker([s.lat, s.lon], { ...BASE }).addTo(map);
  m.bindTooltip(cs, { permanent: true, direction: "top", offset: [0, -8], className: "cs-label" });
  m.on("mouseover", () => hoverFromMap(cs, true));
  m.on("mouseout",  () => hoverFromMap(cs, false));
  m.on("click",     () => selectCall(cs));
  markers[cs] = m;
}
function fitAll(){
  const pts = Object.values(markers).map(m => m.getLatLng());
  if (pts.length >= 2) map.fitBounds(L.latLngBounds(pts).pad(0.15));
}

/* ═══════════════════ DATA HELPERS (chart logic) ══════════════════════ */
const rx = (listener, speaker) => model.M[listener]?.[speaker] ?? 0;
const isConn = v => v !== 0;
const hasNum = v => typeof v === "number" && v !== 0;

function combine(a, b, mode){
  if (mode === "heardBy") return isConn(a) ? a : null;
  if (mode === "canHear") return isConn(b) ? b : null;
  if (mode === "and"){
    if (!(isConn(a) && isConn(b))) return null;
    if (a === "-" || b === "-") return "-";
    return Math.min(a, b);
  }
  if (mode === "or"){
    if (!(isConn(a) || isConn(b))) return null;
    const nums = [a, b].filter(hasNum);
    return nums.length ? Math.max(...nums) : "-";
  }
  return null;
}
function styleFor(v){
  if (v === "-")  return { color: "#1B1B1B", dash: null };
  if (v === 0.5)  return { color: "#D7263D", dash: "6 6" };
  if (v === 1)    return { color: "#D7263D", dash: null };
  if (v === 2)    return { color: "#F28E1C", dash: null };
  return            { color: "#1F6FEB", dash: null };
}
const sigLabel = v => v === "-" ? "unrated" : "S" + v;

/* ══════════════════════ SEARCHABLE DROPDOWN ══════════════════════════ */
const input = document.getElementById("csInput");
const list  = document.getElementById("comboList");
let selected = null;

function renderCombo(filter){
  const f = (filter || "").trim().toLowerCase();
  const hits = model.calls.filter(c =>
    c.toLowerCase().includes(f) || (model.info[c]?.name || "").toLowerCase().includes(f));
  list.innerHTML = "";
  if (!hits.length){ list.innerHTML = '<div class="combo-empty">No matching station</div>'; return; }
  for (const c of hits){
    const d = document.createElement("div");
    d.className = "combo-item" + (c === selected ? " active" : "");
    d.setAttribute("role", "option");
    d.dataset.cs = c;
    d.innerHTML = `<span>${esc(c)}</span><span class="who">${esc(model.info[c]?.name || "")}</span>`;
    d.addEventListener("mousedown", e => { e.preventDefault(); selectCall(c); });
    list.appendChild(d);
  }
}
function openCombo(){ renderCombo(input.value === selected ? "" : input.value);
  list.classList.add("open"); input.setAttribute("aria-expanded","true"); }
function closeCombo(){ list.classList.remove("open"); input.setAttribute("aria-expanded","false"); }
input.addEventListener("focus", openCombo);
input.addEventListener("click", openCombo);
input.addEventListener("input", openCombo);
input.addEventListener("keydown", e => {
  if (e.key === "Enter"){
    const first = list.querySelector(".combo-item");
    if (first) selectCall(first.dataset.cs);
  } else if (e.key === "Escape"){ closeCombo(); input.blur(); }
});
document.addEventListener("click", e => {
  if (!document.getElementById("combo").contains(e.target)) closeCombo();
});
function selectCall(cs){ selected = cs; input.value = cs; closeCombo(); input.blur(); update(); }

/* ═══════════════ CHECKBOXES + AND/OR TOGGLE ══════════════════════════ */
const ckHB = document.getElementById("ckHeardBy");
const ckCH = document.getElementById("ckCanHear");
const seg  = document.getElementById("seg");
const btnAnd = document.getElementById("btnAnd");
const btnOr  = document.getElementById("btnOr");
let logic = "and";

function setLogic(v){
  logic = v;
  btnAnd.classList.toggle("on", v === "and");
  btnOr .classList.toggle("on", v === "or");
  btnAnd.setAttribute("aria-pressed", v === "and");
  btnOr .setAttribute("aria-pressed", v === "or");
  update();
}
btnAnd.addEventListener("click", () => { if (!seg.classList.contains("disabled")) setLogic("and"); });
btnOr .addEventListener("click", () => { if (!seg.classList.contains("disabled")) setLogic("or"); });
function refreshSeg(){
  const both = ckHB.checked && ckCH.checked;
  seg.classList.toggle("disabled", !both);
  btnAnd.disabled = btnOr.disabled = !both;
  if (both) setLogic("and"); else update();
}
ckHB.addEventListener("change", refreshSeg);
ckCH.addEventListener("change", refreshSeg);
function currentMode(){
  if (ckHB.checked && ckCH.checked) return logic;
  if (ckHB.checked) return "heardBy";
  if (ckCH.checked) return "canHear";
  return null;
}

/* ═══════════════════ RESULTS LIST + MAP LINES ════════════════════════ */
const resultsEl = document.getElementById("results");
const countEl   = document.getElementById("count");
const noticeEl  = document.getElementById("notice");

function update(){
  lineLayer.clearLayers();
  resultsEl.innerHTML = "";
  countEl.textContent = "";
  noticeEl.style.display = "none";
  for (const cs in markers) markers[cs].setStyle({ ...BASE }).setRadius(BASE.radius);

  if (!selected){
    resultsEl.innerHTML = '<li class="hint">Pick a station above to see who they can reach.</li>';
    return;
  }
  const selM = markers[selected];
  if (selM) selM.setStyle({ fillColor: "#0E6E8C" }).setRadius(10);

  const mode = currentMode();
  if (!mode){
    resultsEl.innerHTML = '<li class="hint">Check “heard by”, “can hear”, or both to build the contact list.</li>';
    return;
  }
  const rowsOut = [];
  for (const cs of model.calls){
    if (cs === selected) continue;
    const a = rx(cs, selected);   // they hear the selected station ("heard by")
    const b = rx(selected, cs);   // selected station hears them   ("can hear")
    const v = combine(a, b, mode);
    if (v !== null) rowsOut.push({ cs, v, a, b });
  }
  rowsOut.sort((x, y) =>
    (y.v === "-" ? -0.1 : y.v) - (x.v === "-" ? -0.1 : x.v) || x.cs.localeCompare(y.cs));
  countEl.textContent = "· " + rowsOut.length;

  if (!rowsOut.length)
    resultsEl.innerHTML = '<li class="hint">No stations match this filter for ' + esc(selected) + ".</li>";
  if (!selM){
    noticeEl.textContent = selected + " isn't on the map yet (no address found) — lines will appear once it can be placed.";
    noticeEl.style.display = "block";
  }

  for (const r of rowsOut){
    const st = styleFor(r.v);
    const li = document.createElement("li");
    li.className = "res"; li.id = "res-" + cssId(r.cs);
    const dash = st.dash ? ' stroke-dasharray="5 4"' : "";
    let meta;
    if (mode === "heardBy")      meta = "hears you: " + sigLabel(r.a);
    else if (mode === "canHear") meta = "you hear: " + sigLabel(r.b);
    else meta = (isConn(r.a) ? "hears you: " + sigLabel(r.a) : "can’t hear you") +
          "<br>" + (isConn(r.b) ? "you hear: " + sigLabel(r.b) : "you can’t hear them");
    const who = model.info[r.cs]?.name;
    const noDot = !markers[r.cs] ? '<span class="nomap">not on map</span>' : "";
    li.innerHTML =
      `<svg class="swatch" width="26" height="8"><line x1="0" y1="4" x2="26" y2="4" stroke="${st.color}" stroke-width="3"${dash}/></svg>` +
      `<span class="cs">${esc(r.cs)}${who ? '<span class="who">' + esc(who) + "</span>" : ""}${noDot ? " " + noDot : ""}</span>` +
      `<span class="meta">${meta}</span>`;
    li.addEventListener("mouseenter", () => hoverFromList(r.cs, true));
    li.addEventListener("mouseleave", () => hoverFromList(r.cs, false));
    resultsEl.appendChild(li);

    if (selM && markers[r.cs]){
      L.polyline([selM.getLatLng(), markers[r.cs].getLatLng()], {
        color: st.color, weight: 3, opacity: .9, dashArray: st.dash, interactive: false
      }).addTo(lineLayer);
    }
  }
}
const cssId = s => s.replace(/[^a-z0-9]+/gi, "_");

/* ═══════════════════ HOVER SYNC (map ↔ list) ═════════════════════════ */
function hoverFromMap(cs, on){
  const li = document.getElementById("res-" + cssId(cs));
  if (li){ li.classList.toggle("hl", on); if (on) li.scrollIntoView({ block: "nearest" }); }
}
function hoverFromList(cs, on){
  const m = markers[cs];
  if (!m) return;
  m.setRadius(on ? BASE.radius + 4 : (cs === selected ? 10 : BASE.radius));
  m.setStyle({ fillColor: on || cs === selected ? "#0E6E8C" : BASE.fillColor });
}

/* ═══════════════════════ DATA NOTES PANEL ════════════════════════════ */
function renderNotes(){
  const i = model.issues, parts = [];
  const sec = (title, arr, fmt = x => esc(String(x))) => {
    if (arr.length) parts.push(`<h4>${title} (${arr.length})</h4><ul>` +
      arr.map(x => "<li>" + fmt(x) + "</li>").join("") + "</ul>");
  };
  sec("No matching contact / address — station stays off the map", i.noContact);
  sec("Address couldn't be placed on the map", i.geoFail);
  sec("Placed at street level only (approximate)", i.geoApprox);
  sec("Two or more contacts share one chart name", i.dupes);
  sec("In the contacts sheet but not in this test chart", i.notInChart,
      c => esc(c.name) + (c.call && c.call !== "?" ? " — " + esc(c.call) : ""));
  parts.push(`<h4>Tips</h4><ul>
    <li><button id="retryGeo" type="button">Retry address lookup</button> (e.g. after fixing an address or getting back online)</li>
    <li>Fix a name mismatch by making the spelling match in either sheet (or add a line to ALIASES inside this file).</li>
    <li>Pin any dot exactly by adding <b>LAT</b> and <b>LON</b> columns to the contacts sheet (right-click a spot in Google Maps to copy the numbers).</li>
    <li>To update the site: re-export the sheets as CSV, rename to <b>contacts.csv</b> / <b>chart.csv</b>, replace the files, refresh.</li></ul>`);
  document.getElementById("notesBody").innerHTML = parts.join("");
  document.getElementById("retryGeo")?.addEventListener("click", geocodeAll);
  const n = i.noContact.length + i.geoFail.length + i.dupes.length + i.notInChart.length;
  document.getElementById("notesCount").textContent = n ? "(" + n + ")" : "";
}

/* ═════════════════════════════ BOOT ══════════════════════════════════ */
function boot(){
  document.getElementById("overlay").remove();
  for (const cs of model.calls) addMarker(cs);   // any with LAT/LON already
  renderCombo("");
  refreshSeg();
  renderNotes();
  map.invalidateSize();
  geocodeAll();
}
window.addEventListener("resize", () => map.invalidateSize());
startLoad();
</script>
</body>
